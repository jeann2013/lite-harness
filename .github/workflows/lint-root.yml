name: Lint repo root

on:
  pull_request:
    paths:
      - '**'

jobs:
  check-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if unexpected files exist at repo root
        run: |
          ALLOWED_FILES="Dockerfile README.md VISION.md AGENTS.md CODING_STANDARDS.md start-local.sh .gitignore"
          ALLOWED_DIRS=".github .githooks cli docs harnesses mcp skills ui"

          fail=0
          for entry in $(ls -A .); do
            # Skip hidden dot-files/dirs that are standard git tooling
            case "$entry" in
              .git|.gitignore|.github|.DS_Store) continue ;;
            esac

            if [ -f "$entry" ]; then
              if ! echo "$ALLOWED_FILES" | grep -qw "$entry"; then
                echo "::error::Unexpected file at root: $entry"
                fail=1
              fi
            elif [ -d "$entry" ]; then
              if ! echo "$ALLOWED_DIRS" | grep -qw "$entry"; then
                echo "::error::Unexpected directory at root: $entry"
                fail=1
              fi
            fi
          done

          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "Root must only contain:"
            echo "  Files: $ALLOWED_FILES"
            echo "  Dirs:  $ALLOWED_DIRS"
            echo ""
            echo "Move new files into the appropriate subdirectory (harnesses/, cli/, docs/, etc.)."
            exit 1
          fi

          echo "Root is clean."
